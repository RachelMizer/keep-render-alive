name: Keep Render Alive

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:           # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping services
        run: |
          URLS=(
            "https://orderly-0t1h.onrender.com"
            "https://tagmatch-app-undy6p.azurewebsites.net"
            # "https://your-third-service.onrender.com"
          )

          for URL in "${URLS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "$URL -> $STATUS"
            if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
              echo "Unexpected status $STATUS for $URL"
              exit 1
            fi
          done
